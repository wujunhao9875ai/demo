<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - 二次元聊天</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #ff6b9d;
            --primary-light: #ffb3d1;
            --secondary: #7c5cff;
            --accent: #00d4ff;
            --bg-dark: #0f0f1a;
            --bg-card: rgba(30, 30, 50, 0.8);
            --text: #ffffff;
            --text-muted: #a0a0c0;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .rainbow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                45deg,
                rgba(255, 107, 157, 0.1),
                rgba(124, 92, 255, 0.1),
                rgba(0, 212, 255, 0.1),
                rgba(255, 107, 157, 0.1)
            );
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            animation: fadeInDown 0.8s ease;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            animation: pulse 2s infinite;
            box-shadow: 
                0 0 30px rgba(255, 107, 157, 0.5),
                0 0 60px rgba(124, 92, 255, 0.3);
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 
                    0 0 30px rgba(255, 107, 157, 0.5),
                    0 0 60px rgba(124, 92, 255, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 
                    0 0 50px rgba(255, 107, 157, 0.7),
                    0 0 80px rgba(124, 92, 255, 0.5);
            }
        }
        
        .avatar-ring {
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 3px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }
        
        .avatar-ring:nth-child(2) {
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-top-color: var(--primary);
            animation-duration: 2s;
            animation-direction: reverse;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textGlow 2s ease-in-out infinite alternate;
        }
        
        @keyframes textGlow {
            from {
                filter: drop-shadow(0 0 10px rgba(255, 107, 157, 0.5));
            }
            to {
                filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.8));
            }
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 5px;
        }
        
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 107, 157, 0.3);
            animation: fadeIn 1s ease 0.3s both;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        
        .status-dot.online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        
        .status-dot.offline {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid rgba(124, 92, 255, 0.3);
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.3),
                inset 0 0 60px rgba(124, 92, 255, 0.05);
            animation: fadeInUp 0.8s ease 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .chat-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(124, 92, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-header-icon {
            font-size: 20px;
        }
        
        .chat-header-text {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 3px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            animation: messageIn 0.4s ease;
        }
        
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
        }
        
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-bottom-right-radius: 5px;
            color: white;
        }
        
        .message.assistant .message-content {
            background: rgba(60, 60, 80, 0.8);
            border-bottom-left-radius: 5px;
            color: var(--text);
            border: 1px solid rgba(124, 92, 255, 0.2);
        }
        
        .message.assistant .message-content.answer {
            background: rgba(60, 60, 80, 0.8);
            border-bottom-left-radius: 5px;
            color: var(--text);
            border: 1px solid rgba(124, 92, 255, 0.2);
        }
        
        .message.assistant .message-content.answer .answer-text {
            display: block;
            line-height: 1.6;
        }
        
        .tool-calls {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 12px;
            border-left: 3px solid var(--accent);
        }
        
        .tool-name {
            color: var(--accent);
            font-weight: 500;
        }
        
        .input-container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(124, 92, 255, 0.2);
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .input-box {
            flex: 1;
            position: relative;
        }
        
        .chat-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid rgba(124, 92, 255, 0.3);
            border-radius: 25px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }
        
        .chat-input::placeholder {
            color: var(--text-muted);
        }
        
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
        }
        
        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 30px rgba(255, 107, 157, 0.6);
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading-dots {
            display: flex;
            gap: 5px;
            padding: 10px;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .floating-emoji {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            animation: floatEmoji 10s infinite;
            opacity: 0.6;
            z-index: 0;
        }
        
        @keyframes floatEmoji {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
            }
        }
        
        .quick-commands {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .quick-cmd {
            padding: 8px 16px;
            background: rgba(124, 92, 255, 0.2);
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-radius: 20px;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .quick-cmd:hover {
            background: rgba(124, 92, 255, 0.4);
            color: white;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .title {
                font-size: 22px;
            }
            
            .message-content {
                max-width: 85%;
            }
            
            .avatar-container {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="rainbow-bg"></div>
    <div class="bg-particles" id="particles"></div>
    
    <div class="floating-emoji" style="top: 10%; left: 5%;">✨</div>
    <div class="floating-emoji" style="top: 20%; right: 10%; animation-delay: -3s;">🌟</div>
    <div class="floating-emoji" style="top: 60%; left: 8%; animation-delay: -5s;">💫</div>
    <div class="floating-emoji" style="top: 80%; right: 5%; animation-delay: -7s;">⭐</div>
    
    <div class="container">
        <header class="header">
            <div class="avatar-container">
                <div class="avatar-ring"></div>
                <div class="avatar-ring"></div>
                <div class="avatar">🤖</div>
            </div>
            <h1 class="title">AI 智能助手</h1>
            <p class="subtitle">基于 MCP + LangChain 的多模态助手</p>
            
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot online" id="mcpStatus"></span>
                    <span>MCP 服务</span>
                </div>
                <div class="status-item">
                    <span class="status-dot online" id="agentStatus"></span>
                    <span>Agent 就绪</span>
                </div>
            </div>
        </header>
        
        <div class="chat-container">
            <div class="chat-header">
                <span class="chat-header-icon">💬</span>
                <span class="chat-header-text">开始和 AI 助手对话吧！</span>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        你好！我是 AI 智能助手 👋<br><br>
                        我可以帮助你：<br>
                        • 🔢 使用数学计算工具<br>
                        • 📅 查询当前时间日期<br>
                        • 📚 检索知识库信息<br><br>
                        请随时向我提问！
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-box">
                        <input type="text" class="chat-input" id="chatInput" 
                               placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        ➤
                    </button>
                </div>
                <div class="quick-commands">
                    <button class="quick-cmd" onclick="quickQuery('明天星期几？')">📅 明天星期几</button>
                    <button class="quick-cmd" onclick="quickQuery('1+1等于多少？')">🔢 1+1等于</button>
                    <button class="quick-cmd" onclick="quickQuery('介绍一下桌面运维')">📚 桌面运维</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) { // 减少粒子数量
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
        
        let isLoading = false;
        let sessionId = null;
        
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function quickQuery(text) {
            document.getElementById('chatInput').value = text;
            sendMessage();
        }
        
        function addMessage(content, isUser = false, toolInfo = null, isThinking = false) {
            const messages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            messageDiv.dataset.isThinking = isThinking;
            
            let toolHtml = '';
            if (toolInfo) {
                toolHtml = `<div class="tool-calls">🔧 工具调用: <span class="tool-name">${toolInfo}</span></div>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${isUser ? '👤' : '🤖'}</div>
                <div class="message-content ${isThinking ? 'thinking' : ''}">
                    ${content}
                    ${toolHtml}
                </div>
            `;
            
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function addLoadingMessage() {
            const messages = document.getElementById('chatMessages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="loading-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messages.appendChild(loadingDiv);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function removeLoadingMessage() {
            const loading = document.getElementById('loadingMessage');
            if (loading) loading.remove();
        }
        
        let typewriterTimers = {};
        let typewriterIdCounter = 0;
        
        function createTypewriter(element, speed) {
            const id = ++typewriterIdCounter;
            typewriterTimers[id] = {
                element: element,
                speed: speed,
                queue: [],
                isRunning: false,
                currentIndex: 0,
                currentText: ''
            };
            return id;
        }
        
        function appendToTypewriter(id, text) {
            const tw = typewriterTimers[id];
            if (!tw) return;
            tw.queue.push(text);
            if (!tw.isRunning) {
                tw.isRunning = true;
                processTypewriterQueue(id);
            }
        }
        
        function processTypewriterQueue(id) {
            const tw = typewriterTimers[id];
            if (!tw || tw.queue.length === 0) {
                if (tw) tw.isRunning = false;
                return;
            }
            
            const text = tw.queue.shift();
            tw.currentText = text;
            tw.currentIndex = 0;
            
            function typeChar() {
                if (tw.currentIndex < tw.currentText.length) {
                    const char = tw.currentText[tw.currentIndex];
                    if (char === '\\' && tw.currentText[tw.currentIndex + 1] === 'n') {
                        tw.element.textContent += '\n';
                        tw.currentIndex += 2;
                    } else {
                        tw.element.textContent += char;
                        tw.currentIndex++;
                    }
                    const messages = document.getElementById('chatMessages');
                    messages.scrollTop = messages.scrollHeight;
                    if (tw.element.classList.contains('thinking-text')) {
                        tw.element.scrollTop = tw.element.scrollHeight;
                    }
                    setTimeout(typeChar, tw.speed);
                } else {
                    processTypewriterQueue(id);
                }
            }
            
            typeChar();
        }
        
        function stopTypewriter(id) {
            if (typewriterTimers[id]) {
                const tw = typewriterTimers[id];
                tw.queue = [];
                tw.isRunning = false;
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            input.value = '';
            
            addMessage(message, true);
            addLoadingMessage();
            
            let answerDiv = null;
            let answerContent = null;
            let answerTypewriterId = null;
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                removeLoadingMessage();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            let data = line.slice(6);
                            
                            if (data.startsWith('[THINKING]')) {
                                continue;
                            }
                            
                            if (!answerDiv) {
                                const messages = document.getElementById('chatMessages');
                                answerDiv = document.createElement('div');
                                answerDiv.className = 'message assistant';
                                answerDiv.innerHTML = `
                                    <div class="message-avatar">🤖</div>
                                    <div class="message-content answer">
                                        <span class="answer-text"></span>
                                    </div>
                                `;
                                messages.appendChild(answerDiv);
                                answerContent = answerDiv.querySelector('.answer-text');
                                answerTypewriterId = createTypewriter(answerContent, 30);
                                messages.scrollTop = messages.scrollHeight;
                            }
                            appendToTypewriter(answerTypewriterId, data);
                        }
                    }
                }
                
            } catch (error) {
                removeLoadingMessage();
                addMessage('抱歉，发生错误: ' + error.message, false);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }
        
        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                document.getElementById('mcpStatus').className = 
                    'status-dot ' + (data.mcp_running ? 'online' : 'offline');
                document.getElementById('agentStatus').className = 
                    'status-dot ' + (data.agent_ready ? 'online' : 'offline');
            } catch (e) {
                document.getElementById('mcpStatus').className = 'status-dot offline';
                document.getElementById('agentStatus').className = 'status-dot offline';
            }
        }
        
        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
